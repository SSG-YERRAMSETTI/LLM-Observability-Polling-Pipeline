name: Build and Deploy to Cloud Run

# ── Trigger ───────────────────────────────────────────────────────────────────
# Changed to manual-only trigger.
# Run automatically (on push) only after GCP secrets are configured.
# To enable auto-deploy: change 'workflow_dispatch' to:
#   push:
#     branches: [main]

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'

env:
  GCP_PROJECT:  ${{ secrets.GCP_PROJECT_ID }}
  REGION:       us-central1
  REGISTRY:     us-central1-docker.pkg.dev
  IMAGE:        us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/llm-observability/pipeline

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy llm-observability-pipeline \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --platform=managed \
            --no-allow-unauthenticated

      - name: Show deployed URL
        run: |
          gcloud run services describe llm-observability-pipeline \
            --region=${{ env.REGION }} \
            --format="value(status.url)"
