# ══════════════════════════════════════════════════════════════
# LLM Observability Pipeline — Configuration
# ══════════════════════════════════════════════════════════════

# Arize platform settings (credentials via env vars)
arize:
  base_url:   "https://api.arize.com/v1"
  model_id:   "your-model-id"          # Replace with your Arize model ID
  batch_size: 500                       # Max traces per poll

# Polling schedule
poll_interval_seconds: 60              # Poll every 60 seconds
lookback_minutes: 10                   # Fetch traces from last N minutes

# GCP settings
gcp_project: "your-gcp-project-id"    # Replace with your GCP project
region: "us-central1"

# Vertex AI judge model for evaluation
judge_model: "gemini-1.5-flash"        # Fast + cost-effective judge

# Evaluation thresholds — alert if scores drop below these
alert_thresholds:
  relevance:    3.5
  coherence:    3.5
  groundedness: 3.0
  safety:       4.0
  overall:      3.5

# Export settings
output_dir:    "exports"
export_format: "parquet"               # parquet | csv | json

# Logging
log_level: "INFO"
